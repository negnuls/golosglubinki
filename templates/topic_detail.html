{% extends "base.html" %}
{% block content %}
    <h1>{{ topic.title }}</h1>
    <p>{{ topic.content }}</p>
    <p>Лайков: {{ topic.likes }}</p>

    <hr>
    <h3>Комментарии:</h3>
    {% for comment in comments %}
        <div class="comment">
            <strong>{{ comment.author }}:</strong> {{ comment.text }}
        </div>
    {% endfor %}

    <hr>
    <form method="POST">
        <textarea name="text" placeholder="Ваш комментарий..." required></textarea><br>
        <button type="submit">Отправить</button>
    </form>
{% endblock %}
