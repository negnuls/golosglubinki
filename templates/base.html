<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голос Глубинки</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fef08a; } /* Желтый фон как на скрине */
        .card-hover:hover { transform: scale(1.02); transition: 0.3s; }
    </style>
</head>
<body class="font-sans text-gray-900">
<nav class="sticky top-0 z-50 mb-10 shadow-xl">
    <div style="background-color: #2563eb;" class="border-b-2 border-blue-400">
        <div class="container mx-auto flex justify-between items-center h-20 px-6">

            <a href="{{ url_for('index') }}" class="flex flex-col leading-none group">
                <span class="text-3xl font-black italic tracking-tighter text-white group-hover:text-blue-200 transition-colors uppercase">
                    Голос
                </span>
                <span class="text-lg font-bold text-blue-200 group-hover:text-white transition-colors ml-4 uppercase tracking-[0.2em]">
                    Глубинки
                </span>
            </a>

            <div class="flex items-center gap-6">
                {% if current_user.is_authenticated %}
                    <div class="hidden md:flex flex-col items-end mr-2 text-white">
                        <span class="text-[10px] uppercase opacity-70 tracking-widest">В сети</span>
                        <span class="font-bold tracking-tight">{{ current_user.username }}</span>
                    </div>

                    <a href="#" class="flex items-center justify-center w-12 h-12 rounded-xl bg-white/10 border border-white/20 text-white hover:bg-white hover:text-blue-600 transition-all duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </a>

                    <a href="{{ url_for('logout') }}" class="bg-blue-800/50 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-lg border border-white/10 transition-all uppercase tracking-widest">
                        Выход
                    </a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="group relative inline-flex items-center justify-center px-6 py-3 font-bold text-white transition-all duration-200 bg-blue-700 font-pj rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 border-2 border-white hover:bg-white hover:text-blue-600">
                        РЕГИСТРАЦИЯ
                    </a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="h-1 bg-blue-800 shadow-inner"></div>
</nav>
    <main class="container mx-auto px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
