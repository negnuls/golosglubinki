<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голос Глубинки — Форум</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
    <div class="header-container">
        <div class="nav-left">
            <a href="{{ url_for('index') }}" class="nav-link">Главная</a>
        </div>

        <div class="logo-text-central">Голос Глубинки</div>

        <div class="nav-right">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('logout') }}" class="auth-btn-outline">Выйти</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="auth-btn-outline">Войти</a>
            {% endif %}
        </div>
    </div>
</header>

    <main class="main">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <span>© 2026 Голос Глубинки</span>
        <div class="footer-links">
            <a href="#">Правила</a>
            <a href="#">Контакты</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js.js') }}"></script>

    <script>
        // Скрипт для эффекта прозрачности шапки при скролле
        window.addEventListener('scroll', function () {
            const header = document.getElementById('header');
            if (window.scrollY > 10) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
