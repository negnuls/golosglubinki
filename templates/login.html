{% extends "base.html" %}

{% block content %}
<div style="max-width: 450px; margin: 50px auto; background: white; border: 4px solid #000000; padding: 35px; box-shadow: 10px 10px 0 rgba(0,0,0,1);">
    <h1 style="text-align: center; font-size: 32px; font-weight: bold; color: #000000; margin-bottom: 30px; text-transform: uppercase; font-family: 'Inter', 'Segoe UI', sans-serif;">
        ВХОД В ГЛУБИНКУ
    </h1>

<!-- форма -->
    <div style="display: flex; border: 2px solid #2563EB; margin-bottom: 25px;">
        <button id="showLogin" style="flex: 1; padding: 12px; background: #2563EB; color: white; font-weight: bold; font-size: 16px; cursor: pointer; border: none; transition: 0.3s;">
            Вход
        </button>
        <button id="showRegister" style="flex: 1; padding: 12px; background: white; color: #2563EB; font-weight: bold; font-size: 16px; cursor: pointer; border: none; transition: 0.3s;">
            Регистрация
        </button>
    </div>

<!-- форма входа -->
    <form id="loginForm" method="POST" action="{{ url_for('login') }}">
        <input type="hidden" name="form_type" value="login">

        <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #1f2937;">Логин</label>
        <input type="text" name="username" placeholder="Твой логин" required
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #2563EB; border-radius: 5px; font-size: 14px; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #1f2937;">Пароль</label>
        <input type="password" name="password" placeholder="Секретный шифр" required
               style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #2563EB; border-radius: 5px; font-size: 14px; box-sizing: border-box;">

<!-- забыли пароль -->
        <div style="text-align: right; margin-bottom: 25px;">
            <a href="{{ url_for('forgot_password') }}" style="color: #2563EB; text-decoration: none; font-size: 14px; font-weight: bold;">
                Забыли пароль?
            </a>
        </div>

        <button type="submit" style="width: 100%; padding: 14px; background: #2563EB; color: white; font-weight: bold; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; text-transform: uppercase;">
            ВОРВАТЬСЯ
        </button>
    </form>

<!-- форма регистрации -->
    <form id="registerForm" method="POST" action="{{ url_for('login') }}" style="display: none;">
        <input type="hidden" name="form_type" value="register">

        <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #1f2937;">Придумай логин</label>
        <input type="text" name="username" placeholder="Твой уникальный логин" required
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #2563EB; border-radius: 5px; font-size: 14px; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #1f2937;">Email</label>
        <input type="email" name="email" placeholder="Твоя почта (для восстановления пароля)" required
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #2563EB; border-radius: 5px; font-size: 14px; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #1f2937;">Пароль</label>
        <input type="password" name="password" placeholder="Придумай пароль" required
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #2563EB; border-radius: 5px; font-size: 14px; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #1f2937;">Повтори пароль</label>
        <input type="password" name="confirm_password" placeholder="Повтори пароль" required
               style="width: 100%; padding: 12px; margin-bottom: 25px; border: 2px solid #2563EB; border-radius: 5px; font-size: 14px; box-sizing: border-box;">

        <button type="submit" style="width: 100%; padding: 14px; background: #2563EB; color: white; font-weight: bold; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; text-transform: uppercase;">
            ЗАРЕГАТЬСЯ
        </button>
    </form>
</div>

<script>
    const showLogin = document.getElementById('showLogin');
    const showRegister = document.getElementById('showRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    showLogin.onclick = () => {
        showLogin.style.background = '#2563EB';
        showLogin.style.color = 'white';
        showRegister.style.background = 'white';
        showRegister.style.color = '#2563EB';
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
    };

    showRegister.onclick = () => {
        showRegister.style.background = '#2563EB';
        showRegister.style.color = 'white';
        showLogin.style.background = 'white';
        showLogin.style.color = '#2563EB';
        registerForm.style.display = 'block';
        loginForm.style.display = 'none';
    };


    document.getElementById('registerForm').onsubmit = (e) => {
        const password = e.target.querySelector('input[name="password"]').value;
        const confirm = e.target.querySelector('input[name="confirm_password"]').value;
        const email = e.target.querySelector('input[name="email"]').value;

        if (password !== confirm) {
            e.preventDefault();
            alert('Пароли не совпадают! Попробуй ещё раз.');
        } else if (password.length < 3) {
            e.preventDefault();
            alert('Пароль должен быть минимум 3 символа!');
        } else if (!email || !email.includes('@')) {
            e.preventDefault();
            alert('Введите корректный email!');
        }
    };
</script>
{% endblock %}
